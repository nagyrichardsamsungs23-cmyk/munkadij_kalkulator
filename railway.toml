[build]
builder = "nixpacks"

[deploy]
# A Railway ezeket a parancsokat futtatja
# Először migráció, aztán seed, végül a szerver
startCommand = "python manage.py migrate && python manage.py seed_data && python manage.py set_admin_password && gunicorn config.wsgi --bind 0.0.0.0:${PORT:-8000} --workers 2"

[service]
healthcheckPath = "/"
